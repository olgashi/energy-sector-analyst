services:
  backend:
    build:
      context: ./server
    environment:
      HOST: ${BACKEND_HOST:-0.0.0.0}
      PORT: 3000
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    depends_on:
      - backend
    ports:
      - "8080:80"
